name: ci-cd
on:
  push:
    branches: [main]
jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
      - name: Build image
        run: docker build -t mlops-template:${{ github.sha }} .
      # - name: Push & deploy (configure your registry/cluster)
      #   run: echo "docker push ... && kubectl set image ..."
